display_name: Rill Embedding Example Project

olap_connector: duckdb

# Mock users for testing the project's security policies.
mock_users:
  # User with email domain that matches data in auctions_security_domain
  - email: jane@fubo.tv

  # User with custom attributes that matches data in auctions_security_custom_attributes
  - email: custom-fubo-taboola@example.com
    app_site_name: FuboTV
    pub_name: Taboola

  # User with custom attributes that matches data in auctions_security_custom_attributes
  - email: custom-sling-taboola@example.com
    app_site_name: Sling
    pub_name: Taboola

# Customize available features.
# Note the use of .user.embed to disable certain features in embeds.
features:
  dashboard_chat: true
  exports: "{{ not .user.embed }}"
