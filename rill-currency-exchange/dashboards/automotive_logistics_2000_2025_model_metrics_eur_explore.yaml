# Explore YAML
# Reference documentation: https://docs.rilldata.com/reference/project-files/explore-dashboards

type: explore

display_name: "Automotive Logistics EUR Child Metrics View"
metrics_view: automotive_logistics_2000_2025_model_metrics_eur

dimensions: '*'
measures: '*'

defaults:
  measures:
    - avg_unit_price_eur
    - total_quantity_shipped_measure
    - total_shipments_eur
    - total_value_eur
  dimensions:
    - shipment_id
    - origin_country
    - currency
    - vehicle_type
    - status
    - port_of_entry
    - country
    - quarter
    - shifted_quarter
    - date_modified_string
    - date_modified_num_string
  time_range: P7D
